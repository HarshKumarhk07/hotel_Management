# Render Blueprint for the KDS backend.
# Create the service via: Render Dashboard → New → Blueprint → point at this repo.
services:
  - type: web
    name: kds-backend
    runtime: node
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Secrets — set these in the Render dashboard (sync:false keeps them out of git).
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: ADMIN_SECRET_CODE
        sync: false
      - key: KITCHEN_SECRET_CODE
        sync: false
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: SECURITY_ALERT_EMAIL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
